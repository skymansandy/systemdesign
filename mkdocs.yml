site_name: Sandybox — System Design
site_description: System Design Interview Prep Knowledge Base
site_author: Sandy

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

docs_dir: designs

nav:
  - Home:
    - index.md
    - Best Practices: home/best-practices/index.md
    - Common Building Blocks: home/building-blocks/index.md
    - Technology Trade-offs: home/tech-tradeoffs/index.md
    - Platform Fundamentals: home/platform-fundamentals/index.md

  - Social & Media:
    - Chat Application: social-media/chat-app/index.md
    - News Feed: social-media/news-feed/index.md
    - Instagram / Photo Sharing: social-media/instagram/index.md
    - Video Streaming: social-media/video-streaming/index.md
    - Multimedia Feed: social-media/multimedia-feed/index.md
    - Reddit Comment UI: social-media/reddit-comments/index.md
    - Message Expiration: social-media/message-expiration/index.md

  - E-Commerce & Payments:
    - E-Commerce: e-commerce-payments/e-commerce/index.md
    - Mobile Payment: e-commerce-payments/mobile-payment/index.md
    - Splitwise: e-commerce-payments/splitwise/index.md
    - Stock Broking: e-commerce-payments/stock-broking/index.md
    - Hotel Reservation: e-commerce-payments/hotel-reservation/index.md

  - Productivity & Location:
    - Offline Document Editor: productivity-location/offline-document-editor/index.md
    - Location-Based App: productivity-location/location-based-app/index.md
    - Recurring Schedules: productivity-location/recurring-schedules/index.md
    - Search Autocomplete: productivity-location/search-autocomplete/index.md

  - Education & Testing:
    - Live Class App: education-testing/live-class/index.md
    - Test Taking: education-testing/test-taking/index.md

  - Infrastructure & SDKs:
    - Image Loading Library: infrastructure-sdks/image-loading/index.md
    - File Download Manager: infrastructure-sdks/file-download-manager/index.md
    - Network Layer: infrastructure-sdks/network-layer/index.md
    - Push Notification: infrastructure-sdks/push-notification/index.md
    - Analytics SDK: infrastructure-sdks/analytics-sdk/index.md
    - Feature Flags: infrastructure-sdks/feature-flags/index.md
    - Design System: infrastructure-sdks/design-system/index.md
    - App Update & Migration: infrastructure-sdks/app-update-migration/index.md
    - Pagination Library: infrastructure-sdks/pagination-library/index.md
