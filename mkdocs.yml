site_name: Sandybox — System Design
site_description: System Design Interview Prep Knowledge Base
site_author: Sandy

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

docs_dir: designs

nav:
  - Home:
    - index.md

  - Social & Media:
    - Chat Application:
      - chat-app/generic.md
      - chat-app/mobile.md
    - News Feed:
      - news-feed/generic.md
      - news-feed/mobile.md
    - Instagram / Photo Sharing:
      - instagram/mobile.md
    - Video Streaming:
      - video-streaming/mobile.md
    - Multimedia Feed:
      - multimedia-feed/mobile.md

  - E-Commerce & Payments:
    - E-Commerce:
      - e-commerce/mobile.md
    - Mobile Payment:
      - mobile-payment/generic.md
      - mobile-payment/mobile.md
    - Stock Broking:
      - stock-broking/generic.md
      - stock-broking/mobile.md
    - Hotel Reservation:
      - hotel-reservation/generic.md
      - hotel-reservation/mobile.md

  - Productivity & Location:
    - Offline Document Editor:
      - offline-document-editor/mobile.md
    - Location-Based App:
      - location-based-app/mobile.md
    - Search Autocomplete:
      - search-autocomplete/mobile.md

  - Education & Testing:
    - Live Class App:
      - live-class/mobile.md
    - Test Taking:
      - test-taking/mobile.md

  - Best Practices:
    - best-practices/index.md

  - Infrastructure & SDKs:
    - Image Loading Library:
      - image-loading/mobile.md
    - File Download Manager:
      - file-download-manager/mobile.md
    - Network Layer:
      - network-layer/mobile.md
    - Push Notification:
      - push-notification/mobile.md
    - Analytics SDK:
      - analytics-sdk/mobile.md
    - Feature Flags:
      - feature-flags/mobile.md
    - Design System:
      - design-system/mobile.md
    - App Update & Migration:
      - app-update-migration/mobile.md
    - Pagination Library:
      - pagination-library/mobile.md
