site_name: Sandybox — System Design
site_description: System Design Interview Prep Knowledge Base
site_author: Sandy

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

docs_dir: designs

nav:
  - Home:
    - index.md
    - Best Practices: home/best-practices/index.md
    - Common Building Blocks: home/building-blocks/index.md
    - Technology Trade-offs: home/tech-tradeoffs/index.md
    - Platform Fundamentals: home/platform-fundamentals/index.md

  - Social & Media:
    - Chat Application:
      - social-media/chat-app/generic.md
      - social-media/chat-app/mobile.md
    - News Feed:
      - social-media/news-feed/generic.md
      - social-media/news-feed/mobile.md
    - Instagram / Photo Sharing:
      - social-media/instagram/mobile.md
    - Video Streaming:
      - social-media/video-streaming/mobile.md
    - Multimedia Feed:
      - social-media/multimedia-feed/mobile.md

  - E-Commerce & Payments:
    - E-Commerce:
      - e-commerce-payments/e-commerce/mobile.md
    - Mobile Payment:
      - e-commerce-payments/mobile-payment/generic.md
      - e-commerce-payments/mobile-payment/mobile.md
    - Stock Broking:
      - e-commerce-payments/stock-broking/generic.md
      - e-commerce-payments/stock-broking/mobile.md
    - Hotel Reservation:
      - e-commerce-payments/hotel-reservation/generic.md
      - e-commerce-payments/hotel-reservation/mobile.md

  - Productivity & Location:
    - Offline Document Editor:
      - productivity-location/offline-document-editor/mobile.md
    - Location-Based App:
      - productivity-location/location-based-app/mobile.md
    - Search Autocomplete:
      - productivity-location/search-autocomplete/mobile.md

  - Education & Testing:
    - Live Class App:
      - education-testing/live-class/mobile.md
    - Test Taking:
      - education-testing/test-taking/mobile.md

  - Infrastructure & SDKs:
    - Image Loading Library:
      - infrastructure-sdks/image-loading/mobile.md
    - File Download Manager:
      - infrastructure-sdks/file-download-manager/mobile.md
    - Network Layer:
      - infrastructure-sdks/network-layer/mobile.md
    - Push Notification:
      - infrastructure-sdks/push-notification/mobile.md
    - Analytics SDK:
      - infrastructure-sdks/analytics-sdk/mobile.md
    - Feature Flags:
      - infrastructure-sdks/feature-flags/mobile.md
    - Design System:
      - infrastructure-sdks/design-system/mobile.md
    - App Update & Migration:
      - infrastructure-sdks/app-update-migration/mobile.md
    - Pagination Library:
      - infrastructure-sdks/pagination-library/mobile.md
